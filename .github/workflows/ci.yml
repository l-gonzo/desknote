name: CI
on:
  push:
  pull_request:

jobs:
  build-debian:
    runs-on: ubuntu-latest
    container: debian:13
    steps:
      - uses: actions/checkout@v4
      - name: Dependencies
        run: |
          apt-get update
          apt-get install -y cargo rustc pkg-config build-essential libgtk-4-dev libgtk4-layer-shell-dev
      - name: Format
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Test
        run: cargo test --workspace
      - name: Shell validation
        run: find scripts configs/labwc -type f -perm /111 -print0 | xargs -0 -n1 sh -n
